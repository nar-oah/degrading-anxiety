services:
  api:
    image: ghcr.io/nar-oah/degrading-anxiety/api:latest
    container_name: degrading-anxiety-api
    restart: always
    networks:
      - traefik
      - backend
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.degrading-anxiety.rule=Host(`aws.naroah.top`) && PathPrefix(`/degrading-anxiety`)"
      - "traefik.http.routers.degrading-anxiety.entrypoints=websecure"
      - "traefik.http.routers.degrading-anxiety.tls.certresolver=letsencrypt"
      - "traefik.http.services.degrading-anxiety.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.degrading-anxiety-strip.stripprefix.prefixes=/degrading-anxiety"
      - "traefik.http.routers.degrading-anxiety.middlewares=degrading-anxiety-strip"

  schedule:
    image: ghcr.io/nar-oah/degrading-anxiety/schedule:latest
    container_name: degrading-anxiety-schedule
    restart: always
    networks:
      - backend
    env_file:
      - .env

networks:
  traefik:
    external: true

  backend:
    external: true
