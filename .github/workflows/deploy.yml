name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "compose.prod.yml"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_DIR: /home/deploy/apps/${{ github.event.repository.name }}
  COMPOSE_FILE: compose.prod.yml

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            path: services/api
            image: ghcr.io/${{ github.repository }}/api:latest

          - name: schedule
            path: services/schedule
            image: ghcr.io/${{ github.repository }}/schedule:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Dockerfile
        run: test -f "${{ matrix.path }}/Dockerfile"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t "${{ matrix.image }}" "${{ matrix.path }}"

      - name: Push image
        run: docker push "${{ matrix.image }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_DIR }}/services/radicale"
            touch "${{ env.DEPLOY_DIR }}/.env"
            chmod 600 "${{ env.DEPLOY_DIR }}/.env"

      - name: Upload deployment files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "compose.prod.yml,services/radicale/config"
          target: "${{ env.DEPLOY_DIR }}"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            test -f compose.prod.yml
            test -f services/radicale/config
            docker compose -f compose.prod.yml config >/dev/null
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d --remove-orphans
            docker compose -f compose.prod.yml restart radicale
            docker compose -f compose.prod.yml ps
            docker image prune -f
