name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "compose.prod.yml"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_DIR: /home/deploy/apps/${{ github.event.repository.name }}
  COMPOSE_FILE: compose.prod.yml

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api
          - schedule
          - radicale

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile
        run: test -f "backend/${{ matrix.service }}/Dockerfile"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -f "backend/${{ matrix.service }}/Dockerfile" \
            -t "ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest" \
            backend

      - name: Push image
        run: docker push "ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            mkdir -p "${{ env.DEPLOY_DIR }}"
            touch "${{ env.DEPLOY_DIR }}/.env"
            chmod 600 "${{ env.DEPLOY_DIR }}/.env"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "${{ env.COMPOSE_FILE }}"
          target: "${{ env.DEPLOY_DIR }}"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd "${{ env.DEPLOY_DIR }}"
            test -f "${{ env.COMPOSE_FILE }}"
            docker compose -f "${{ env.COMPOSE_FILE }}" config >/dev/null
            docker compose -f "${{ env.COMPOSE_FILE }}" pull
            docker compose -f "${{ env.COMPOSE_FILE }}" up -d --remove-orphans --wait --wait-timeout 60
            docker compose -f "${{ env.COMPOSE_FILE }}" ps
            docker image prune -f
