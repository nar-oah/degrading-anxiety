name: tauri-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example, v0.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            platform: windows-latest
            args: ""
            rust-target: ""
          - name: macos-x64
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - name: macos-arm64
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build shared frontend package
        run: pnpm app:build
        working-directory: frontend

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend/desktop
          tauriScript: pnpm exec tauri
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: Release for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  android:
    name: build-android
    uses: ./.github/workflows/tauri-android-release.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    secrets: inherit
